name: GitHub Pages

on:
  push:
    tags:
      - '*'
    branches:
      [ flutter_rewrite ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
      - run: flutter pub get
      - uses: bluefireteam/flutter-gh-pages@v7
        with:
          webRenderer: html
          baseHref: /OfflineCookBook/
